services:
  - type: web
    name: raj-gems
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install --prefix client && npm run build --prefix client && npm install --prefix server --legacy-peer-deps
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://raj-gems.onrender.com
      # Add these in Render dashboard if you have Cloudinary:
      # - key: CLOUDINARY_CLOUD_NAME
      #   sync: false
      # - key: CLOUDINARY_API_KEY
      #   sync: false
      # - key: CLOUDINARY_API_SECRET
      #   sync: false
    disk:
      name: raj-gems-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
